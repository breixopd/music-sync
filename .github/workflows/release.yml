name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-version:
    name: Verify tag version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Require exact PEP 621 project version tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          tag = os.environ.get("RELEASE_TAG", "")
          with Path("pyproject.toml").open("rb") as pyproject_file:
              project = tomllib.load(pyproject_file).get("project", {})
          version = project.get("version")

          if not isinstance(version, str) or not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", version):
              raise SystemExit("pyproject.toml must define a stable X.Y.Z project.version")
          if not re.fullmatch(r"v[0-9]+\.[0-9]+\.[0-9]+", tag):
              raise SystemExit(f"release tag must be vX.Y.Z, got {tag!r}")
          expected_tag = f"v{version}"
          if tag != expected_tag:
              raise SystemExit(
                  f"release tag {tag!r} does not exactly match PEP 621 project version {version!r}"
              )
          print(f"Verified {tag} against pyproject.toml project.version={version}")
          PY

  verify:
    name: Verify release
    needs: verify-version
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish release
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      attestations: write # Attach signed provenance to the image.
      contents: write # Create the GitHub release for the pushed tag.
      id-token: write # Issue the OIDC identity used by attestations.
      packages: write # Publish the image to GHCR.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: metadata
        env:
          DOCKER_METADATA_SHORT_SHA_LENGTH: 40
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          provenance: mode=max
          sbom: true
      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
